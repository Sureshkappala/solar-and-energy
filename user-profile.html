<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aethera User Profile settings.">
    <title>Aethera | Profile Settings</title>
    <link rel="stylesheet" href="css/main.css?v=2.7">
    <link rel="stylesheet" href="css/dashboards.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="dash-wrapper">
        <!-- SIDEBAR -->
        <aside class="dash-sidebar">
            <div class="dash-sidebar-header">
                <a href="user-dashboard.html" class="logo-link">
                    <img src="images/logo.png" alt="Stackly Logo" class="logo-img">
                </a>
            </div>
            <ul class="dash-menu">
                <li class="dash-menu-item">
                    <a href="user-dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                </li>
                <li class="dash-menu-item">
                    <a href="user-projects.html"><i class="fa-solid fa-solar-panel"></i> My Projects</a>
                </li>
                <li class="dash-menu-item">
                    <a href="user-reports.html"><i class="fa-solid fa-file-invoice"></i> Energy Reports</a>
                </li>
                <li class="dash-menu-item active">
                    <a href="user-profile.html"><i class="fa-solid fa-user-gear"></i> Profile Settings</a>
                </li>
                <li class="dash-menu-item">
                    <a href="user-support.html"><i class="fa-solid fa-circle-question"></i> Help Support</a>
                </li>
            </ul>
            <div class="dash-sidebar-footer">
                <li class="dash-menu-item" style="list-style: none;">
                    <a href="login.html" style="color: #ef4444;"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</a>
                </li>
            </div>
        </aside>

        <!-- MAIN LAYOUT -->
        <div class="dash-main">
            <!-- TOPBAR -->
            <header class="dash-topbar">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <button class="dash-menu-trigger" aria-label="Toggle Sidebar"><i class="fa-solid fa-bars"></i></button>
                    <div class="dash-page-title">
                        <h2>Profile Settings</h2>
                    </div>
                </div>
                <div class="dash-topbar-right">
                    <div class="dash-user-profile">
                        <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=100&q=80" alt="Avatar">
                        <div>
                            <span class="dash-user-name">Charles Davis</span>
                            <span class="dash-user-role">Premium Consumer</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- INNER MAIN CONTENT -->
            <main class="dash-content-inner">
                <div class="table-card glass-card" style="max-width: 650px; margin: 0 auto;">
                    <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 24px; color: #fff;">Account Profile Information</h3>
                    <form id="profileForm" onsubmit="event.preventDefault(); alert('Profile details updated successfully!');">
                        <div class="form-row">
                            <div class="form-group" style="margin-bottom:0;">
                                <label for="firstName">First Name</label>
                                <input type="text" id="firstName" value="Charles" required>
                            </div>
                            <div class="form-group" style="margin-bottom:0;">
                                <label for="lastName">Last Name</label>
                                <input type="text" id="lastName" value="Davis" required>
                            </div>
                        </div>
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" value="charles.davis@company.com" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 30px;">
                            <label for="phone">Phone Number</label>
                            <input type="text" id="phone" value="+1 (555) 321-0987" required>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; height: 50px;">Save Profile Updates <i class="fa-solid fa-floppy-disk" style="margin-left: 6px;"></i></button>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js?v=2.7"></script>
    <script src="js/dashboards.js?v=2.7"></script>
</body>
</html>
