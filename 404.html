<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="404 - Page Not Found. The resource requested is not connected to our green grid.">
    <title>Aethera | 404 Page Not Found</title>
    <link rel="stylesheet" href="css/main.css?v=1.1">
    <link rel="stylesheet" href="css/pages.css?v=1.1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body style="background-color: var(--bg-primary);">

    <section class="error-page" style="position: relative;">
        <!-- Back Link -->
        <a href="index.html" class="auth-back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>

        <div class="error-content">
            <!-- Animated Floating 404 Illustration -->
            <img src="images/404.webp" alt="404 Error" class="float-animation">

            <h2>Oops! Page Not Found</h2>
            <p>The grid node coordinates you requested do not point to any active solar arrays, wind energy clusters, or clean storage arrays. The page may have been relocated.</p>

            <div class="error-buttons">
                <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
                <a href="index.html" class="btn btn-primary">Back To Home</a>
            </div>
        </div>
    </section>

    <script src="js/main.js?v=1.1"></script>
</body>
</html>
