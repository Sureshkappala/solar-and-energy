<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aethera Admin system configurations settings.">
    <title>Aethera | Admin Settings</title>
    <link rel="stylesheet" href="css/main.css?v=2.6">
    <link rel="stylesheet" href="css/dashboards.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="dash-wrapper">
        <!-- SIDEBAR -->
        <aside class="dash-sidebar">
            <div class="dash-sidebar-header">
                <a href="admin-dashboard.html" class="logo-link">
                    <img src="images/logo.png" alt="Stackly Logo" class="logo-img">
                </a>
            </div>
            <ul class="dash-menu">
                <li class="dash-menu-item">
                    <a href="admin-dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                </li>
                <li class="dash-menu-item">
                    <a href="admin-users.html"><i class="fa-solid fa-users"></i> Users</a>
                </li>
                <li class="dash-menu-item">
                    <a href="admin-services.html"><i class="fa-solid fa-gears"></i> Services</a>
                </li>
                <li class="dash-menu-item">
                    <a href="admin-projects.html"><i class="fa-solid fa-solar-panel"></i> Projects</a>
                </li>
                <li class="dash-menu-item">
                    <a href="admin-messages.html"><i class="fa-solid fa-envelope"></i> Messages</a>
                </li>
                <li class="dash-menu-item active">
                    <a href="admin-settings.html"><i class="fa-solid fa-sliders"></i> Settings</a>
                </li>
            </ul>
            <div class="dash-sidebar-footer">
                <li class="dash-menu-item" style="list-style: none;">
                    <a href="login.html" style="color: #ef4444;"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</a>
                </li>
            </div>
        </aside>

        <!-- MAIN LAYOUT -->
        <div class="dash-main">
            <!-- TOPBAR -->
            <header class="dash-topbar">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <button class="dash-menu-trigger" aria-label="Toggle Sidebar"><i class="fa-solid fa-bars"></i></button>
                    <div class="dash-page-title">
                        <h2>System Configurations</h2>
                    </div>
                </div>
                <div class="dash-topbar-right">
                    <div class="dash-user-profile">
                        <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&w=100&q=80" alt="Avatar">
                        <div>
                            <span class="dash-user-name">Dr. Elena Rostova</span>
                            <span class="dash-user-role">System Admin</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- INNER MAIN CONTENT -->
            <main class="dash-content-inner dash-two-col-grid">
                <!-- Column 1: Grid Pricing & Thresholds -->
                <div class="table-card glass-card">
                    <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 24px; color: #fff;">Grid Prices & Alert Thresholds</h3>
                    <form id="settingsForm" onsubmit="event.preventDefault(); alert('Global system configurations successfully updated!');">
                        <div class="form-group">
                            <label for="basePrice">Base Electricity Tariff ($ / kWh)</label>
                            <input type="number" id="basePrice" step="0.01" value="0.12" required>
                        </div>
                        <div class="form-group">
                            <label for="feedPrice">Feed-in Net tariff credit ($ / kWh)</label>
                            <input type="number" id="feedPrice" step="0.01" value="0.08" required>
                        </div>
                        <div class="form-group">
                            <label for="alertTemp">Battery Temperature Alarm Limit (&deg;C)</label>
                            <input type="number" id="alertTemp" value="45" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 30px;">
                            <label class="checkbox-group">
                                <input type="checkbox" checked>
                                <span>Broadcast maintenance alert flags directly to active consumers</span>
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; height: 50px;">Save Grid Configuration <i class="fa-solid fa-floppy-disk" style="margin-left: 6px;"></i></button>
                    </form>
                </div>

                <!-- Column 2: System Access & Sync Settings -->
                <div class="table-card glass-card">
                    <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 24px; color: #fff;">Access & Sync Frequencies</h3>
                    <form id="systemSettingsForm" onsubmit="event.preventDefault(); alert('Backup and Sync configurations saved!');">
                        <div class="form-group">
                            <label for="backupInterval">Cloud Database Backup Interval</label>
                            <select id="backupInterval" style="width: 100%; padding: 12px 16px; border-radius: var(--border-radius-sm); border: 1px solid var(--glass-border); background: var(--bg-tertiary); color: #fff; outline: none; cursor: pointer;">
                                <option value="hourly">Every Hour</option>
                                <option value="daily" selected>Every 24 Hours</option>
                                <option value="weekly">Every Week</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="telemetrySync">Telemetry Sync Refresh Rate</label>
                            <select id="telemetrySync" style="width: 100%; padding: 12px 16px; border-radius: var(--border-radius-sm); border: 1px solid var(--glass-border); background: var(--bg-tertiary); color: #fff; outline: none; cursor: pointer;">
                                <option value="5s">5 Seconds</option>
                                <option value="30s" selected>30 Seconds</option>
                                <option value="1m">1 Minute</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="adminKey">Subsystem API Token (Read-Only)</label>
                            <input type="password" id="adminKey" value="••••••••••••••••••••••••" readonly style="width: 100%; padding: 12px 16px; border-radius: var(--border-radius-sm); border: 1px solid var(--glass-border); background: var(--bg-tertiary); color: var(--text-muted); outline: none;">
                        </div>
                        <div class="form-group" style="margin-bottom: 30px;">
                            <label class="checkbox-group">
                                <input type="checkbox" checked>
                                <span>Enable encrypted logging for grid nodes</span>
                            </label>
                        </div>

                        <button type="submit" class="btn btn-secondary" style="width: 100%; justify-content: center; height: 50px;">Save System Settings <i class="fa-solid fa-server" style="margin-left: 6px;"></i></button>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js?v=2.6"></script>
    <script src="js/dashboards.js?v=2.6"></script>
</body>
</html>
