<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer glowing rings -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#leafGrad)" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="8 4" />
  <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  
  <!-- Solar Sun Rays -->
  <g transform="translate(50,50)">
    <path d="M 0,-24 L 0,-30 M 0,24 L 0,30 M -24,0 L -30,0 M 24,0 L 30,0" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.8" />
    <path d="M -17,-17 L -21,-21 M 17,17 L 21,21 M -17,17 L -21,21 M 17,-17 L 21,-21" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" opacity="0.8" />
  </g>
  
  <!-- Base Leaf Pattern (Renewable / Eco) -->
  <path d="M 50 16 C 26 30 26 70 50 84 C 74 70 74 30 50 16 Z" fill="url(#leafGrad)" opacity="0.15" />
  
  <!-- Eco-leaf central node -->
  <path d="M 50 22 C 32 36 32 64 50 78 C 50 78 54 62 50 50 C 46 38 50 22 50 22 Z" fill="url(#leafGrad)" filter="url(#glow)" />
  
  <!-- Power Bolt Integration (Spark/Energy) -->
  <path d="M 52 35 L 40 52 L 49 52 L 46 66 L 60 48 L 50 48 Z" fill="#ffffff" filter="url(#glow)" />
</svg>
